name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install nuitka keyboard opencv-python numpy pyautogui pydirectinput pygame pillow ordered-set zstandard

      - name: Build launcher.exe (onefile, Nuitka)
        shell: pwsh
        run: |
          python -m nuitka --onefile --assume-yes-for-downloads --windows-console-mode=disable `
            --enable-plugin=tk-inter `
            --windows-icon-from-ico=Fishing.ico `
            --include-data-files=ASK.mp3=ASK.mp3 `
            --include-data-files=knopkasebe.jpg=knopkasebe.jpg `
            --include-data-files=otpustit.png=otpustit.png `
            --include-data-files=1.png=1.png `
            --include-data-files=q11.png=q11.png `
            --include-data-files=q12.png=q12.png `
            --include-data-files=stop.png=stop.png `
            --include-data-files=EZEFISH.jpg=EZEFISH.jpg `
            --include-data-files=config.json=config.json `
            launcher.py

      - name: Archive build output
        shell: pwsh
        run: |
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          Move-Item -Path launcher.exe -Destination dist/launcher.exe -Force
          Compress-Archive -Path dist/launcher.exe -DestinationPath dist/launcher-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows
          path: dist/launcher-windows.zip
