name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard keyboard opencv-python numpy pyautogui pydirectinput pygame pillow

      - name: Build launcher.exe (single file, no console)
        shell: pwsh
        run: |
          python -m nuitka launcher.py `
            --onefile `
            --windows-console-mode=disable `
            --windows-icon-from-ico=Fishing.ico `
            --enable-plugin=tk-inter `
            --include-data-files=ASK.mp3=ASK.mp3 `
            --include-data-files=knopkasebe.jpg=knopkasebe.jpg `
            --include-data-files=otpustit.png=otpustit.png `
            --include-data-files=1.png=1.png `
            --include-data-files=q11.png=q11.png `
            --include-data-files=q12.png=q12.png `
            --include-data-files=stop.png=stop.png `
            --include-data-files=EZEFISH.jpg=EZEFISH.jpg `
            --include-data-files=config.json=config.json `
            --output-filename=launcher.exe

      - name: Archive build output
        shell: pwsh
        run: |
          Compress-Archive -Path launcher.exe -DestinationPath launcher-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows
          path: launcher-windows.zip
